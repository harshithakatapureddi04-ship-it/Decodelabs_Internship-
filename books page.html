<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Books</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#8e44ad;
    color:white;
    text-align:center;
    padding:20px;
}

.controls{
    text-align:center;
    margin:20px;
}

button{
    padding:10px 15px;
    margin:5px;
    background:#8e44ad;
    color:white;
    border:none;
    cursor:pointer;
}

.books{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.book{
    background:white;
    width:250px;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.book img{
    width:100%;
    height:250px;
    object-fit:cover;
}

#message{
    text-align:center;
    font-size:20px;
    color:#8e44ad;
}
</style>
</head>

<body>

<header>
<h1>Available Books</h1>
</header>

<div class="controls">

<button onclick="showOffer()">Today's Offer</button>

<button onclick="toggleBooks()">Hide / Show Books</button>

</div>

<div id="message"></div>

<div class="books" id="bookSection">

<div class="book">
<img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f">
<h3>Python Programming</h3>
<p>₹499</p>
<button onclick="buyBook('Python Programming')">
Buy Now
</button>
</div>

<div class="book">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
<h3>Web Development</h3>
<p>₹599</p>
<button onclick="buyBook('Web Development')">
Buy Now
</button>
</div>

<div class="book">
<img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d">
<h3>Data Structures</h3>
<p>₹450</p>
<button onclick="buyBook('Data Structures')">
Buy Now
</button>
</div>

</div>

<script>

function showOffer(){
document.getElementById("message").innerHTML=
"🎉 Get 20% Discount Today!";
}

function buyBook(book){
document.getElementById("message").innerHTML=
"✅ Selected: " + book;
}

function toggleBooks(){

let books=document.getElementById("bookSection");

if(books.style.display=="none"){
books.style.display="flex";
}
else{
books.style.display="none";
}
}
</script>

</body>
</html>
