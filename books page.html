<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Store - Books</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#34495e;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:gold;
}

.dark-btn{
    background:#f39c12;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.search-box{
    text-align:center;
    margin:20px;
}

.search-box input{
    width:300px;
    max-width:90%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.offer-btn{
    display:block;
    margin:10px auto;
    background:#27ae60;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

#message{
    text-align:center;
    font-weight:bold;
    color:#8e44ad;
    margin:15px;
}

.books{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.book{
    width:260px;
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.book:hover{
    transform:translateY(-10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.book img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:5px;
}

.book h3{
    margin:10px 0;
}

.cart-btn{
    background:#3498db;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .book{
    background:#1f1f1f;
    color:white;
}

footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

@media(max-width:768px){

    nav{
        flex-direction:column;
    }

    .books{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<header>
<h1>📚 Available Books</h1>
</header>

<nav>
<a href="home.html">Home</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="books.html">Books</a>
<a href="contact.html">Contact</a>

<button class="dark-btn" onclick="toggleTheme()">
🌙 Dark Mode
</button>
</nav>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Books..."
onkeyup="searchBooks()">

</div>

<button class="offer-btn" onclick="showOffer()">
🎉 Today's Offer
</button>

<div id="message"></div>

<div class="books">

<div class="book">
<img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f" alt="Python">
<h3>Python Programming</h3>
<p>₹499</p>
<button class="cart-btn"
onclick="buyBook('Python Programming')">
Add To Cart
</button>
</div>

<div class="book">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794" alt="Web">
<h3>Web Development</h3>
<p>₹599</p>
<button class="cart-btn"
onclick="buyBook('Web Development')">
Add To Cart
</button>
</div>

<div class="book">
<img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d" alt="DSA">
<h3>Data Structures</h3>
<p>₹450</p>
<button class="cart-btn"
onclick="buyBook('Data Structures')">
Add To Cart
</button>
</div>

</div>

<footer>
<p>© 2026 Online Book Store</p>
</footer>

<script>

function toggleTheme(){
    document.body.classList.toggle("dark-mode");
}

function showOffer(){

    document.getElementById("message").innerHTML =
    "🎉 Today Only: Get 20% OFF on All Books!";
}

function buyBook(book){

    document.getElementById("message").innerHTML =
    "🛒 " + book + " added to cart successfully!";
}

function searchBooks(){

    let input =
    document.getElementById("searchInput")
    .value.toLowerCase();

    let books =
    document.getElementsByClassName("book");

    for(let i=0;i<books.length;i++){

        let title =
        books[i]
        .getElementsByTagName("h3")[0]
        .innerText
        .toLowerCase();

        if(title.includes(input)){
            books[i].style.display="block";
        }
        else{
            books[i].style.display="none";
        }
    }
}

</script>

</body>
</html>
