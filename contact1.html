<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Store - Contact Us</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#34495e;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:gold;
}

.dark-btn{
    background:#f39c12;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

.container{
    width:500px;
    max-width:90%;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.send-btn{
    width:100%;
    background:#27ae60;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
    cursor:pointer;
}

.send-btn:hover{
    background:#219150;
}

#count{
    font-size:14px;
    color:#555;
}

#message{
    text-align:center;
    color:green;
    font-weight:bold;
    margin-top:15px;
}

.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .container{
    background:#1f1f1f;
    color:white;
}

footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

@media(max-width:768px){

    nav{
        flex-direction:column;
    }

    .container{
        width:90%;
    }
}

</style>
</head>

<body>

<header>
<h1>📞 Contact Us</h1>
</header>

<nav>
<a href="home.html">Home</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="books.html">Books</a>
<a href="contact.html">Contact</a>

<button class="dark-btn" onclick="toggleTheme()">
🌙 Dark Mode
</button>
</nav>

<div class="container">

<h2>Get In Touch</h2>

<form onsubmit="return sendMessage()">

<input
type="text"
placeholder="Your Name"
required>

<input
type="email"
placeholder="Your Email"
required>

<textarea
id="msg"
rows="6"
placeholder="Write your message here..."
onkeyup="countChars()"
required></textarea>

<p id="count">0 Characters</p>

<button class="send-btn" type="submit">
Send Message
</button>

</form>

<p id="message"></p>

</div>

<footer>
<p>© 2026 Online Book Store | All Rights Reserved</p>
</footer>

<script>

function toggleTheme(){

    document.body.classList.toggle("dark-mode");
}

function countChars(){

    let len =
    document.getElementById("msg")
    .value.length;

    document.getElementById("count")
    .innerHTML =
    len + " Characters";
}

function sendMessage(){

    document.getElementById("message")
    .innerHTML =
    "📩 Message Sent Successfully! We will contact you soon.";

    return false;
}

</script>

</body>
</html>
