<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Store - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#34495e;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:gold;
}

.container{
    width:400px;
    max-width:90%;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

input[type="email"],
input[type="password"],
input[type="text"]{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#2980b9;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#21618c;
}

.show-pass{
    margin:10px 0;
}

#message{
    text-align:center;
    margin-top:15px;
    color:green;
    font-weight:bold;
}

.dark-btn{
    width:auto;
    padding:8px 12px;
    background:#f39c12;
}

.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .container{
    background:#1f1f1f;
    color:white;
}

footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

</style>
</head>

<body>

<header>
<h1>📚 Online Book Store</h1>
</header>

<nav>
<a href="home.html">Home</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="books.html">Books</a>
<a href="contact.html">Contact</a>

<button class="dark-btn" onclick="toggleTheme()">
🌙 Dark Mode
</button>
</nav>

<div class="container">

<h2>Login to Your Account</h2>

<form onsubmit="return loginUser()">

<input
type="email"
placeholder="Email Address"
required>

<input
type="password"
id="loginPass"
placeholder="Password"
required>

<div class="show-pass">
<label>
<input
type="checkbox"
onclick="showPassword()">
Show Password
</label>
</div>

<button type="submit">
Login
</button>

</form>

<p id="message"></p>

</div>

<footer>
<p>© 2026 Online Book Store</p>
</footer>

<script>

function showPassword(){

    let pass =
    document.getElementById("loginPass");

    if(pass.type === "password"){
        pass.type = "text";
    }
    else{
        pass.type = "password";
    }
}

function loginUser(){

    document.getElementById("message").innerHTML =
    "✅ Login Successful! Welcome Back.";

    return false;
}

function toggleTheme(){

    document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
