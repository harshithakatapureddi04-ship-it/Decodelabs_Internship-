<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    font-family:Arial;
    background:#ecf0f1;
}

.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#2980b9;
    color:white;
    border:none;
}

h2,p{
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<form onsubmit="return loginUser()">

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="loginResult"></p>

</div>

<script>
function loginUser(){

document.getElementById("loginResult").innerHTML=
"✅ Login Successful!";

return false;
}
</script>

</body>
</html>
