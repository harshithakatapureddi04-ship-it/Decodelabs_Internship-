
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Store - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#34495e;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:gold;
}

.hero{
    text-align:center;
    padding:40px;
}

.hero img{
    width:700px;
    max-width:100%;
    border-radius:10px;
}

button{
    margin-top:20px;
    padding:10px 15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.dark-btn{
    background:#f39c12;
}

.dark-mode{
    background:#121212;
    color:white;
}

footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>📚 Online Book Store</h1>
<p>Your Favorite Books in One Place</p>
</header>

<nav>
<a href="home1.html">Home</a>
<a href="register1.html">Register</a>
<a href="login1.html">Login</a>
<a href="books page.html">Books</a>
<a href="contact1.html">Contact</a>

<button class="dark-btn" onclick="toggleTheme()">
🌙 Dark Mode
</button>
</nav>

<section class="hero">

<h2 id="welcome">
Welcome to Our Book Store
</h2>

<br>

<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f"
alt="Book Store">

<br>

<button onclick="changeMessage()">
Explore Books
</button>

</section>

<footer>
<p>© 2026 Online Book Store</p>
</footer>

<script>
function changeMessage(){
    document.getElementById("welcome").innerHTML =
    "📚 Discover Your Next Favorite Book!";
}

function toggleTheme(){
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
